<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="contactstyle.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="sale">
        <h1 class="hidden">50% Black Friday Sale!</h1>
        <p class="hidden"><a href="">PURCHASE PRODUCT</a></p>
    </div>
    <section>
        <header>
            <a id="header-img" href="index.html"><img src="img/FEEL MORE ENERGETIC AND BURN FAT IN 10 DAYS (1).png" alt=""></a>
            <nav>
                <a href="index.html">Home</a>
                <a href="#">Product</a>
                <a href="contact.html">Contact</a>
            </nav>
        </header>
        <section class="container">
        <div class="support-form">
            <h1>Support</h1>
            <form action="" method="get">
                <div id="labels">
                    <label for="Email">Email:</label>
                    <label for="Name">Name:</label>
                    <label for="Number">Number:</label>
                    <label for="country">Country:</label>
                    <label for="Reason">Reason:</label>
                    <label for="Message">Message:</label>
                </div>
                <div id="inputs">
                    <input type="email" name="Email" placeholder="Example@gmail.com" required id="Email">
                    <input type="text" name="Name" id="Name" required placeholder="John Doe">
                    <input type="tel" name="Number" id="Number" required placeholder="+1234567890">
                    <select name="Reason" id="Reason" required>
                        <option value="select" selected disabled hidden>Select your country</option>
                        <option value="US">United States</option>
                        <option value="UK">United Kingdom</option>
                        <option value="NL">Netherlands</option>
                        <option value="CA">Canada</option>
                        <option value="AU">Australia</option>
                </div>
            </form>
            </div>
                <div class="support-img">
                    <img src="img/contact-jeff-nippard.png" alt="">
                </div>
        </section>



</body>
</html>
