<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <section>
        <div class="left">
            <div id="score"></div>
            <div id="CRNTQuestion"></div>
            <div id="name"></div>
        </div>
        <div id="container">
            <div id="textContainer">
                <p id="text">Lorem, ipsum dolor sit amet consectetur adipisicing elit?</p>
            </div>
            <button id="restartBtn" style="display:none;">Opnieuw starten</button>
            <br>
            <br>
            <button id="BackToMenu" style="display:none;">Terug Naar Menu</button>
            <div id="optionsContainer">
                <button>1</button>
                <button>2</button>
                <button>3</button>
            </div>
            <div id="feedback" class="hidden"></div>
            <div id="blur-background"></div>
            

        </div>
        <div class="right"></div>
        <div id="hintContainer">
            <p>Hints</p>
            <div id="buttons">
                <button id="50Btn">50/50</button>
                <button id="SkipBtn">Skip</button>
            </div>
        </div>
    </section>
    
    <script src="script.js" defer></script>
</body>
</html>
